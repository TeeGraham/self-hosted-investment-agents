<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f1a2e"/>
      <stop offset="1" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16233b"/>
      <stop offset="1" stop-color="#111c30"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- subtle grid dots -->
  <g fill="#1c2b45" opacity="0.5">
    <circle cx="1120" cy="90" r="3"/><circle cx="1170" cy="90" r="3"/><circle cx="1220" cy="90" r="3"/>
    <circle cx="1120" cy="140" r="3"/><circle cx="1170" cy="140" r="3"/><circle cx="1220" cy="140" r="3"/>
    <circle cx="1120" cy="190" r="3"/><circle cx="1170" cy="190" r="3"/><circle cx="1220" cy="190" r="3"/>
  </g>

  <!-- accent bar -->
  <rect x="80" y="96" width="72" height="8" rx="4" fill="url(#accent)"/>

  <!-- eyebrow -->
  <text x="80" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="3" fill="#7dd3fc">SELF-HOSTED · MULTI-AGENT · AI</text>

  <!-- title -->
  <text x="78" y="248" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#f8fafc">Investment Research</text>
  <text x="78" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#f8fafc">Platform</text>

  <!-- subtitle -->
  <text x="80" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#94a3b8">A personal-scale analog of a Bloomberg / Aladdin research desk —</text>
  <text x="80" y="432" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#94a3b8">a crew of cooperating LLM agents on commodity hardware.</text>

  <!-- chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#cbd5e1">
    <rect x="80" y="474" width="250" height="52" rx="26" fill="url(#chip)" stroke="#24344f" stroke-width="1"/>
    <text x="112" y="507">~40 workflows</text>

    <rect x="350" y="474" width="288" height="52" rx="26" fill="url(#chip)" stroke="#24344f" stroke-width="1"/>
    <text x="382" y="507">Zero-GPU inference</text>

    <rect x="658" y="474" width="330" height="52" rx="26" fill="url(#chip)" stroke="#24344f" stroke-width="1"/>
    <text x="690" y="507">Self-healing automation</text>
  </g>

  <!-- tech line -->
  <text x="80" y="556" font-family="Consolas, Menlo, monospace" font-size="24" fill="#5eead4">n8n · Ollama · Qdrant · PostgreSQL · Docker</text>

  <!-- handle -->
  <text x="80" y="600" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#64748b">github.com/TeeGraham/self-hosted-investment-agents</text>
</svg>
